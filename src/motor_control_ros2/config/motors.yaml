can_interfaces:
  - device: /dev/ttyACM0
    baudrate: 921600
    motors:
      # 左前舵轮单元
      - name: DJI6020_1          # 左前转向电机
        type: GM6020
        id: 1
      
      
      # 右前舵轮单元
      - name: DJI6020_2          # 右前转向电机
        type: GM6020
        id: 2
      
      # 左后舵轮单元
      - name: DJI6020_3          # 左后转向电机
        type: GM6020
        id: 3

      # 右后舵轮单元
      - name: DJI6020_4          # 右后转向电机
        type: GM6020
        id: 4
  
  - device: /dev/ttyACM2
    baudrate: 921600
    motors:
      - name: DJI3508_1          # 左前驱动电机
        type: GM3508
        id: 1
      - name: DJI3508_2          # 左前驱动电机
        type: GM3508
        id: 2
      - name: DJI3508_3          # 左前驱动电机
        type: GM3508
        id: 3
      - name: DJI3508_4          # 左前驱动电机
        type: GM3508
        id: 4

  # CAN 接口 2 (如果有多个 USB-CAN 适配器)
  # - device: /dev/ttyACM1
  #   baudrate: 921600
  #   motors:
  #     # 达妙电机示例
  #     - name: joint1_motor
  #       type: DM4340           # 电机类型: DM4340, DM4310
  #       id: 1                  # 电机 ID
  #     
  #     - name: joint2_motor
  #       type: DM4340
  #       id: 2

# 串口接口配置（宇树电机 - 原生协议，不依赖SDK）
# 注意：direction / offset / kp / kd 已迁移到 delta_arm.yaml，此处只保留硬件参数
serial_interfaces:
  # 串口接口 1 - GO-8010 @ 4Mbps（Delta 机械臂 3 个电机）
  - device: /dev/ttyUSB3
    baudrate: 4000000
    protocol: native
    motors:
      - name: arm_motor_1
        type: GO8010
        id: 0
        gear_ratio: 6.33

  - device: /dev/ttyUSB1
    baudrate: 4000000
    protocol: native
    motors:
      - name: arm_motor_2
        type: GO8010
        id: 0
        gear_ratio: 6.33

  - device: /dev/ttyUSB2
    baudrate: 4000000
    protocol: native
    motors:
      - name: arm_motor_3
        type: GO8010
        id: 0
        gear_ratio: 6.33

# 配置说明:
# 1. 取消注释需要使用的接口和电机
# 2. 修改 device 路径为实际设备
# 3. 设置正确的电机 ID
# 4. 确保电机名称唯一
# 5. 保存后重启控制节点
