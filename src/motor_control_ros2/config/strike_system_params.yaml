# 双臂并联五杆机构击球系统参数配置文件

# 机械臂几何参数
geometry:
  # 两臂肩部间距（米）- 左右对称布置
  arm_spacing: 0.40
  
  # 单臂五杆机构尺寸（米）
  upper_arm_length: 0.30      # L1:大臂长度（副电机外壳到肘关节）
  forearm_length: 0.25        # L2: 小臂长度（肘关节到击球板连接点）
  linkage_length: 0.20        # L3: 连杆长度（副电机转子到小臂附着点）
  
  # 连杆附着点位置（距关节中心的距离，米）
  linkage_attach_on_upper: 0.10   # 连杆在大臂上的附着点（距主电机转子轴心）
  linkage_attach_on_forearm: 0.12 # 连杆在小臂上的附着点（距肘关节）
  
  # 击球板参数
  plate_width: 0.50          # 击球板宽度（米）
  plate_height: 0.40         # 击球板高度（米）
  plate_thickness: 0.01      # 击球板厚度（米）

# 工作空间限制
workspace:
  # 笛卡尔空间范围（米，相对于基座中心）
  x_min: 0.20
  x_max: 0.60
  y_min: -0.15
  y_max: 0.35
  
  # 击球板姿态范围（度）
  orientation_min: -30.0     # 负值=向下倾斜
  orientation_max: 30.0      # 正值=向上倾斜
  
  # 关节角度限制（度）- 防止奇异/碰撞
  left_main_motor_min: -90.0
  left_main_motor_max: 90.0
  left_sub_motor_min: -120.0
  left_sub_motor_max: 120.0
  right_main_motor_min: -90.0
  right_main_motor_max: 90.0
  right_sub_motor_min: -120.0
  right_sub_motor_max: 120.0

# 动力学参数
dynamics:
  # 末端最大性能
  max_velocity: 8.0          # 最大速度（m/s）- 高速击球
  max_acceleration: 50.0     # 最大加速度（m/s²）
  
  # 电机性能限制
  max_motor_velocity: 15.0   # 单个电机最大角速度（rad/s）
  max_motor_torque: 12.0     # 单个电机最大力矩（Nm）
  
  # 质量参数（用于动力学补偿）
  upper_arm_mass: 1.0        # 大臂质量（kg，包含副电机）
  forearm_mass: 0.8          # 小臂质量（kg）
  linkage_mass: 0.3          # 连杆质量（kg）
  plate_mass: 1.5            # 击球板质量（kg）

# 控制参数
control:
  # 控制频率（Hz）
  frequency: 200.0
  
  # 命令超时时间（秒）- 超时后进入安全模式
  command_timeout: 0.5
  
  # 双臂协调误差阈值（米）- 超过阈值报警
  coordination_threshold: 0.01  # 1cm
  
  # 默认PD控制参数（4个电机：左主, 左副, 右主, 右副）
  default_kp: [80.0, 60.0, 80.0, 60.0]  # 主电机刚度更大
  default_kd: [8.0, 6.0, 8.0, 6.0]
  
  # 重力补偿使能
  enable_gravity_compensation: true
  
  # 力前馈使能（提高加速度性能）
  enable_feedforward: true

# 电机映射（对应 motors.yaml 中的电机名称）
motor_mapping:
  left_main_motor: strike_motor_L1    # 左臂主电机
  left_sub_motor: strike_motor_L2     # 左臂副电机（通过连杆驱动）
  right_main_motor: strike_motor_R1   # 右臂主电机
  right_sub_motor: strike_motor_R2    # 右臂副电机

# 安全保护
safety:
  # 使能双臂协调检测
  enable_coordination_check: true
  
  # 关节速度突变阈值（rad/s）- 超过阈值触发紧急停止
  velocity_spike_threshold: 20.0
  
  # 关节温度报警阈值（℃）
  temperature_warning: 65
  temperature_critical: 85
  
  # 力矩超限保护（持续时间 > 阈值触发保护）
  torque_limit_duration: 1.5  # 秒
  
  # 奇异性检测（雅可比矩阵行列式阈值）
  singularity_threshold: 0.01
  
  # 碰撞检测灵敏度（力矩突变阈值，Nm）
  collision_torque_threshold: 10.0

# 轨迹规划参数（高级功能）
trajectory:
  # 插值类型：linear, cubic, quintic
  interpolation_type: quintic
  
  # 轨迹平滑时间（秒）
  smoothing_time: 0.2         # 击球动作快速响应
  
  # 最大加加速度（m/s³）- 限制冲击
  max_jerk: 200.0

# 标定参数（首次使用需标定）
calibration:
  # 零位角度偏移（度）- 机械臂水平向前时的编码器值
  zero_position_offset: [0.0, 0.0, 0.0, 0.0]  # [左主, 左副, 右主, 右副]
  
  # 电机方向校正（1=正向，-1=反向）
  motor_directions: [1, 1, 1, 1]
  
  # 五杆机构装配误差补偿（米）
  linkage_length_error: [0.0, 0.0]  # [左臂, 右臂]
  
  # 机械臂对称性误差（米）
  arm_spacing_error: 0.0
  
  # 是否需要重新标定
  needs_calibration: false

# 运动学求解参数
kinematics:
  # 逆运动学迭代次数上限
  ik_max_iterations: 50
  
  # 逆运动学收敛精度（米）
  ik_tolerance: 0.001        # 1mm
  
  # 数值微分步长（用于雅可比计算）
  numerical_diff_step: 1.0e-6
  
  # 优化权重：[位置误差, 姿态误差, 关节角度变化]
  optimization_weights: [1.0, 0.5, 0.1]
