# 手柄击球拍控制节点参数配置

joystick_strike_control_node:
  ros__parameters:
    # ===================
    # 摇杆参数
    # ===================
    deadzone: 0.10              # 摇杆死区 [0, 1]，推荐 0.08-0.15
    publish_rate: 50.0          # 命令发布频率 (Hz)
    joy_timeout: 0.5            # 手柄信号超时 (秒)
    
    # ===================
    # 任务空间参数
    # ===================
    max_position_delta: 0.5     # 最大位置变化速度 (m/s)
    max_orientation_delta: 0.8  # 最大姿态变化速度 (rad/s)
    
    # 工作空间限制
    min_x: 0.2                  # X 最小值 (m)
    max_x: 0.8                  # X 最大值 (m)
    min_y: -0.3                 # Y 最小值 (m)
    max_y: 0.3                  # Y 最大值 (m)
    max_orientation: 0.524      # 最大姿态角 (rad，约30度)
    
    # ===================
    # 关节空间参数
    # ===================
    max_joint_delta: 1.0        # 最大关节角度变化速度 (rad/s)
    
    # ===================
    # PID 控制参数
    # ===================
    # 默认 PID 增益 [左主, 左副, 右主, 右副]
    default_kp: [80.0, 60.0, 80.0, 60.0]
    default_kd: [8.0, 6.0, 8.0, 6.0]
    kp_step: 10.0               # LB/RB 按键调节步长
    
    # ===================
    # 速度增益模式
    # ===================
    speed_gain_slow: 0.3        # LT 慢速模式增益
    speed_gain_normal: 0.6      # 默认正常速度增益
    speed_gain_fast: 1.0        # RT 快速模式增益
    
    # ===================
    # Xbox 手柄轴映射
    # ===================
    # 摇杆轴（标准 Xbox 映射）
    axis_left_x: 0              # 左摇杆 X 轴
    axis_left_y: 1              # 左摇杆 Y 轴
    axis_right_x: 3             # 右摇杆 X 轴
    axis_right_y: 4             # 右摇杆 Y 轴
    
    # 触发器
    axis_lt: 2                  # LT 左扳机（未按=1.0，按下=-1.0）
    axis_rt: 5                  # RT 右扳机（未按=1.0，按下=-1.0）
    
    # D-pad（十字键）
    axis_dpad_x: 6              # D-pad 左右
    axis_dpad_y: 7              # D-pad 上下
    
    # ===================
    # 按钮映射
    # ===================
    button_a: 0                 # A 键 - 回中心
    button_b: 1                 # B 键 - 急停
    button_x: 2                 # X 键 - 任务空间模式
    button_y: 3                 # Y 键 - 关节空间模式
    button_lb: 4                # LB 左肩键 - 降低刚度
    button_rb: 5                # RB 右肩键 - 提高刚度
    button_back: 6              # Back 键 - 完全重置
    button_start: 7             # Start 键 - 启用/禁用

# ===================
# 使用说明
# ===================
# 
# 1. 如果使用的不是 Xbox 手柄，可能需要调整轴/按钮映射
#    查看手柄映射: ros2 topic echo /joy
# 
# 2. 调整摇杆死区（deadzone）:
#    - 增大死区 (0.15-0.20): 减少摇杆漂移，但需要更大推动
#    - 减小死区 (0.05-0.10): 更灵敏，但可能误触发
# 
# 3. 调整速度参数:
#    - max_position_delta: 降低此值可获得更平滑的运动
#    - speed_gain_slow: 调整慢速模式的速度（建议 0.2-0.4）
# 
# 4. 调整 PID 增益:
#    - 主电机（L1/R1）通常需要更高刚度（80-100）
#    - 副电机（L2/R2）可以稍低（60-80）
#    - 实时调整可使用 LB/RB 按键
# 
# 5. 加载此配置启动节点:
#    ros2 run motor_control_ros2 joystick_strike_control_node \
#      --ros-args --params-file config/joystick_strike_params.yaml
