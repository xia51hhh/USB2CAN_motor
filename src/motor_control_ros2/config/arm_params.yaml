# 单自由度击球系统参数配置文件
# 结构：两条单自由度机械臂（4电机冗余驱动）

# 机械结构参数
structure:
  # 肩关节高度（米）- 电机固定高度
  shoulder_height: 0.50
  
  # 大臂长度（米）- 肩关节到肘关节
  upper_arm_length: 0.35
  
  # 小臂长度（米）- 肘关节到击球板（被动关节）
  forearm_length: 0.30
  
  # 击球板高度（米）- 从小臂末端到击球板中心
  strike_plate_height: 0.10
  
  # 击球角度范围（度）- 肩关节摆动范围（0度=水平向前，正值=向上，负值=向下）
  strike_angle_min: -60.0
  strike_angle_max: 60.0
  
  # 最大角速度（rad/s）- 击球速度上限
  max_velocity: 5.0
  
  # 最大力矩（Nm）- 单个电机最大输出
  max_torque: 12.0

# 控制参数
control:
  # 控制频率（Hz）
  frequency: 200.0
  
  # 命令超时时间（秒）- 超时后保持当前位置
  command_timeout: 0.5
  
  # 同步误差阈值（rad）- 4个电机最大偏差
  sync_error_threshold: 0.05  # 约2.86度
  
  # 默认PD控制参数
  default_kp: 60.0  # 位置比例增益（刚度）
  default_kd: 6.0   # 速度阻尼增益

# 电机映射（对应 motors.yaml 中的电机名称）
# 4个电机冗余驱动同一个自由度，确保刚性和力矩
motor_mapping:
  left_shoulder_1: strike_motor_L1    # 左臂电机1
  left_shoulder_2: strike_motor_L2    # 左臂电机2
  right_shoulder_1: strike_motor_R1   # 右臂电机1
  right_shoulder_2: strike_motor_R2   # 右臂电机2

# 安全保护
safety:
  # 使能同步误差检测
  enable_sync_check: true
  
  # 关节速度突变阈值（rad/s）- 超过阈值触发紧急停止
  velocity_spike_threshold: 15.0
  
  # 关节温度报警阈值（℃）
  temperature_warning: 60
  temperature_critical: 80
  
  # 力矩超限保护（持续时间 > 阈值触发保护）
  torque_limit_duration: 2.0  # 秒
  
  # 碰撞检测灵敏度（力矩突变阈值，Nm）
  collision_torque_threshold: 8.0

# 运动规划参数（可选高级功能）
trajectory:
  # 插值类型：linear, cubic, quintic
  interpolation_type: quintic
  
  # 轨迹平滑时间（秒）
  smoothing_time: 0.3
  
  # 最大加速度（rad/s²）
  max_acceleration: 20.0
  
  # 最大加加速度（rad/s³）
  max_jerk: 100.0

# 重力补偿参数（用于力矩前馈）
gravity_compensation:
  # 使能重力补偿
  enable: true
  
  # 大臂质量（kg）
  upper_arm_mass: 1.5
  
  # 小臂+击球板质量（kg）
  forearm_mass: 1.0
  
  # 重力加速度（m/s²）
  gravity: 9.81

# 标定参数（首次使用需标定）
calibration:
  # 零位角度（度）- 机械臂水平向前时的编码器值
  zero_position_offset: [0.0, 0.0, 0.0, 0.0]  # 4个电机各自的零点偏移
  
  # 电机方向校正（1=正向，-1=反向）
  motor_directions: [1, 1, 1, 1]
  
  # 是否需要重新标定
  needs_calibration: false
