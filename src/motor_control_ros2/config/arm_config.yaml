# Delta 机械臂管理器配置文件
# 节点：delta_arm_manager
# 控制对象：3 路 GO8010 电机

# 控制频率（Hz，默认 200Hz）
control_frequency: 200.0

# 初始化参数（软着陆阶段）
initialization:
  # 软着陆施加的向下力矩（Nm，负值表示向下）
  # 转子侧 0.15 Nm × 减速比 6.33 = 输出端 0.95 Nm（远超静摩擦上限 0.40 Nm）
  downward_torque: -0.15
  # 软着陆超时时间（秒）
  landing_timeout: 5.0
  # 着陆判定：三电机速度反馈绝对值均小于此阈值（rad/s）视为落稳
  landing_velocity_threshold: 0.3
  # 着陆稳定判定：连续保持上述条件的时间（秒）
  landing_stable_duration: 0.8
  # 软着陆阶段阻尼系数（限制下降速度，减少电机间差异）
  landing_kd: 0.05

  # 重力补偿前馈力矩（Nm，转子侧）
  # 正值=向上抵抗重力，用户根据实际负载自行调试
  # 建议从 0.05 开始逐步增大，直到 READY 状态电机不下沉
  gravity_compensation_torque: 0.30

# PD 控制参数（EXECUTE 阶段位置控制）
# 注意：kp/kd 作用于电机转子侧，输出端力矩 = τ_rotor × 减速比 6.33
# kp=0.35: 0.3rad 误差 → 0.35×0.3×6.33 = 0.66 Nm（足够克服重力）
# kd=0.10: 阻尼比 kd/kp = 0.286，充分抑制振荡
pd:
  kp: 0.50
  kd: 0.20

# 运动规划参数（梯形速度规划）
motion_profile:
  # 每帧最大速度增量（rad/s，控制 pos_next = pos_now + clamp(err, ±max_velocity*dt)）
  # 0.8 rad/s：1.20 rad 目标需 1.5s 到达，给电机充足跟踪时间
  max_velocity: 0.8

# 安全参数
safety:
  # 最大允许高度（米，仅参考，实际以角度控制）
  max_height: 0.4
  # 位置误差钳位（rad）：限制 PD 控制器看到的最大位置误差
  # 防止大误差产生过大力矩导致振荡。0.3 rad ≈ 17°
  # τ_max = kp × max_pos_error × gear_ratio = 0.35 × 0.3 × 6.33 = 0.66 Nm
  max_position_error: 0.3

# 目标到达容差（rad）：电机角度与目标的差小于此值视为到达
position_tolerance: 0.05

# 自适应规划：当电机实际位置与规划位置差超过此值时暂停规划器
# 防止规划器跑在电机前面太远
tracking_error_pause: 0.2

# 解耦控制零点（固定 0 rad）：软着陆完成瞬间将当前物理角锁定为零点
# 后续控制全部采用相对增量，且三电机增量应保持一致
decoupled_zero_rad: 0.0

# 电机名称与 ID（对应 motors.yaml 中的 joint_name）
motors:
  - name: "arm_motor_1"
    id: 0
    device: "/dev/ttyUSB3"
  - name: "arm_motor_2"
    id: 0
    device: "/dev/ttyUSB1"
  - name: "arm_motor_3"
    id: 0
    device: "/dev/ttyUSB2"

# 串口通信参数（针对 USB-RS485 适配器响应延迟优化）
serial:
  wait_ms: 4          # 发送后等待时间（原2ms，放宽以适应慢适配器）
  timeout_ms: 12      # 接收总超时（原8ms，放宽减少首次失败率）
